<!DOCTYPE html>
<html>
<head>
    <title>OMA agency</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
        }

        .social a {
            margin-left: 15px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .social a:hover {
            color: #0077ff;
        }

        .container {
            padding: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 0 0 10px;
        }

        .card p {
            margin: 0;
            color: #555;
        }
    </style>
</head>

<body>

<header>
    <h1>OMA agency</h1>

    <div class="social">
        <a href="https://www.instagram.com/oma_agency_uz/#" target="_blank">Instagram</a>
        <a href="https://t.me/oma_agency_uz" target="_blank">Telegram</a>
    </div>
</header>

<div class="container">

    <div class="grid">
        {% for project in projects %}
        <div class="card">
            <a href="/project/{{ project.id }}/">
                <img src="{{ project.image.url }}">
            </a>

            <div class="card-content">
                <h3>{{ project.title }}</h3>
                <p>{{ project.description }}</p>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
